name: CD — Backend

# Triggers on any backend code change or k8s manifest change.
on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - 'k8s/**'
      - '.github/workflows/cd-backend.yml'
  workflow_dispatch:

# OIDC requires id-token: write.
# contents: read is needed for actions/checkout.
# packages: write is kept for compatibility; primary registry is ACR.
permissions:
  id-token: write
  contents: read
  packages: write

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Run unit tests in isolation
  # ──────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r backend/requirements.txt pytest pytest-cov pytest-asyncio

      - name: Run tests
        run: |
          cd backend
          pytest tests/ -v --cov=app --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./backend/coverage.xml
          flags: unittests
          fail_ci_if_error: false

  # ──────────────────────────────────────────────
  # Job 2: Build Docker image and push to ACR
  # ──────────────────────────────────────────────
  build-and-push:
    name: Build & Push to ACR
    runs-on: ubuntu-latest
    needs: test

    outputs:
      short-sha: ${{ steps.vars.outputs.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set short SHA
        id: vars
        run: echo "sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # OIDC login — authenticates to Azure without stored credentials
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name ${{ vars.ACR_NAME }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ vars.ACR_NAME }}.azurecr.io/sondra-keys-backend:${{ steps.vars.outputs.sha }}
            ${{ vars.ACR_NAME }}.azurecr.io/sondra-keys-backend:latest
          # Layer caching in ACR to speed up subsequent builds
          cache-from: type=registry,ref=${{ vars.ACR_NAME }}.azurecr.io/sondra-keys-backend:cache
          cache-to:   type=registry,ref=${{ vars.ACR_NAME }}.azurecr.io/sondra-keys-backend:cache,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

  # ──────────────────────────────────────────────
  # Job 3: Deploy to AKS (main branch only)
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy to AKS
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Fetch AKS kubeconfig using the logged-in OIDC identity
      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --name          ${{ vars.AKS_CLUSTER_NAME }} \
            --overwrite-existing

      # Stamp the ACR login server and image tag into the manifest at deploy time.
      # The manifest on disk uses ACR_LOGIN_SERVER / IMAGE_TAG as placeholders.
      - name: Patch image reference in deployment manifest
        run: |
          sed -i \
            -e "s|ACR_LOGIN_SERVER|${{ vars.ACR_NAME }}.azurecr.io|g" \
            -e "s|IMAGE_TAG|${{ needs.build-and-push.outputs.short-sha }}|g" \
            k8s/backend-deployment.yaml

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/backend-service.yaml
          kubectl apply -f k8s/backend-deployment.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/sondra-keys-backend \
            --timeout=300s

      - name: Verify pods
        run: |
          kubectl get pods -l app=sondra-keys-backend -o wide
          az logout
