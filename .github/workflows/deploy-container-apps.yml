name: Deploy Azure Container Apps

on:
  push:
    branches: [main, develop]
    paths:
      - 'infra/**'
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/deploy-container-apps.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options: [dev, staging, prod]
        default: dev
      imageTag:
        description: 'Optional image tag override (default: commit SHA)'
        required: false
        type: string

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-${{ github.event_name == 'workflow_dispatch' && inputs.environment || (github.ref_name == 'main' && 'prod' || 'dev') }}
  cancel-in-progress: false

env:
  AZURE_LOCATION: ${{ vars.AZURE_LOCATION || 'eastus' }}
  DEPLOY_ENV: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || (github.ref_name == 'main' && 'prod' || 'dev') }}
  IMAGE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.imageTag || github.sha }}

jobs:
  validate:
    name: Validate Bicep (What-If)
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || (github.ref_name == 'main' && 'prod' || 'dev') }}
    env:
      RESOURCE_GROUP_NAME: ${{ vars.AZURE_RESOURCE_GROUP }}
      SEARCH_SERVICE_NAME: ${{ vars.SEARCH_SERVICE_NAME }}
      SEARCH_INDEX_NAME: ${{ vars.SEARCH_INDEX_NAME }}
      STORAGE_ACCOUNT_NAME: ${{ vars.STORAGE_ACCOUNT_NAME }}
      STORAGE_CONTAINER_NAME: ${{ vars.STORAGE_CONTAINER_NAME }}
      DOCUMENT_INTELLIGENCE_ENDPOINT: ${{ vars.DOCUMENT_INTELLIGENCE_ENDPOINT }}
      OPENAI_ENDPOINT: ${{ vars.OPENAI_ENDPOINT }}
      OPENAI_DEPLOYMENT_NAME: ${{ vars.OPENAI_DEPLOYMENT_NAME }}
      OPENAI_API_VERSION: ${{ vars.OPENAI_API_VERSION }}
      DATABASE_ADMIN_USERNAME: ${{ vars.DATABASE_ADMIN_USERNAME }}
      DATABASE_ADMIN_PASSWORD: ${{ secrets.DATABASE_ADMIN_PASSWORD }}
      SEARCH_API_KEY: ${{ secrets.SEARCH_API_KEY }}
      STORAGE_CONNECTION_STRING: ${{ secrets.STORAGE_CONNECTION_STRING }}
      DOCUMENT_INTELLIGENCE_API_KEY: ${{ secrets.DOCUMENT_INTELLIGENCE_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate required GitHub vars/secrets
        shell: bash
        run: |
          set -euo pipefail

          required=(
            SEARCH_SERVICE_NAME
            STORAGE_ACCOUNT_NAME
            DOCUMENT_INTELLIGENCE_ENDPOINT
            OPENAI_ENDPOINT
            OPENAI_DEPLOYMENT_NAME
            DATABASE_ADMIN_USERNAME
            DATABASE_ADMIN_PASSWORD
            SEARCH_API_KEY
            STORAGE_CONNECTION_STRING
            DOCUMENT_INTELLIGENCE_API_KEY
            OPENAI_API_KEY
          )

          missing=()
          for item in "${required[@]}"; do
            if [ -z "${!item:-}" ]; then
              missing+=("$item")
            fi
          done

          if [ ${#missing[@]} -gt 0 ]; then
            echo "Missing required configuration values: ${missing[*]}"
            echo "Set repository Variables/Secrets before running this workflow."
            exit 1
          fi

      - name: Run Bicep what-if
        shell: bash
        run: |
          set -euo pipefail

          resource_group_name="${RESOURCE_GROUP_NAME:-rg-sondra-legal-${DEPLOY_ENV}}"
          search_index_name="${SEARCH_INDEX_NAME:-documents}"
          storage_container_name="${STORAGE_CONTAINER_NAME:-documents}"
          openai_api_version="${OPENAI_API_VERSION:-2024-10-21}"

          params=(
            "environment=${DEPLOY_ENV}"
            "location=${AZURE_LOCATION}"
            "resourceGroupName=${resource_group_name}"
            "imageTag=${IMAGE_TAG}"
            "searchServiceName=${SEARCH_SERVICE_NAME}"
            "searchIndexName=${search_index_name}"
            "storageAccountName=${STORAGE_ACCOUNT_NAME}"
            "storageContainerName=${storage_container_name}"
            "documentIntelligenceEndpoint=${DOCUMENT_INTELLIGENCE_ENDPOINT}"
            "openAIEndpoint=${OPENAI_ENDPOINT}"
            "openAIDeploymentName=${OPENAI_DEPLOYMENT_NAME}"
            "openAIApiVersion=${openai_api_version}"
            "databaseAdminUsername=${DATABASE_ADMIN_USERNAME}"
            "databaseAdminPassword=${DATABASE_ADMIN_PASSWORD}"
            "searchApiKey=${SEARCH_API_KEY}"
            "storageConnectionString=${STORAGE_CONNECTION_STRING}"
            "documentIntelligenceApiKey=${DOCUMENT_INTELLIGENCE_API_KEY}"
            "openAIApiKey=${OPENAI_API_KEY}"
          )

          az deployment sub what-if \
            --location "${AZURE_LOCATION}" \
            --name "whatif-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
            --template-file infra/main.bicep \
            --parameters "${params[@]}"

  bootstrap-infra:
    name: Bootstrap Infra (Create ACR and baseline)
    runs-on: ubuntu-latest
    needs: validate
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || (github.ref_name == 'main' && 'prod' || 'dev') }}
    env:
      RESOURCE_GROUP_NAME: ${{ vars.AZURE_RESOURCE_GROUP }}
      SEARCH_SERVICE_NAME: ${{ vars.SEARCH_SERVICE_NAME }}
      SEARCH_INDEX_NAME: ${{ vars.SEARCH_INDEX_NAME }}
      STORAGE_ACCOUNT_NAME: ${{ vars.STORAGE_ACCOUNT_NAME }}
      STORAGE_CONTAINER_NAME: ${{ vars.STORAGE_CONTAINER_NAME }}
      DOCUMENT_INTELLIGENCE_ENDPOINT: ${{ vars.DOCUMENT_INTELLIGENCE_ENDPOINT }}
      OPENAI_ENDPOINT: ${{ vars.OPENAI_ENDPOINT }}
      OPENAI_DEPLOYMENT_NAME: ${{ vars.OPENAI_DEPLOYMENT_NAME }}
      OPENAI_API_VERSION: ${{ vars.OPENAI_API_VERSION }}
      DATABASE_ADMIN_USERNAME: ${{ vars.DATABASE_ADMIN_USERNAME }}
      DATABASE_ADMIN_PASSWORD: ${{ secrets.DATABASE_ADMIN_PASSWORD }}
      SEARCH_API_KEY: ${{ secrets.SEARCH_API_KEY }}
      STORAGE_CONNECTION_STRING: ${{ secrets.STORAGE_CONNECTION_STRING }}
      DOCUMENT_INTELLIGENCE_API_KEY: ${{ secrets.DOCUMENT_INTELLIGENCE_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy baseline resources with bootstrap image tag
        shell: bash
        run: |
          set -euo pipefail

          resource_group_name="${RESOURCE_GROUP_NAME:-rg-sondra-legal-${DEPLOY_ENV}}"
          search_index_name="${SEARCH_INDEX_NAME:-documents}"
          storage_container_name="${STORAGE_CONTAINER_NAME:-documents}"
          openai_api_version="${OPENAI_API_VERSION:-2024-10-21}"

          params=(
            "environment=${DEPLOY_ENV}"
            "location=${AZURE_LOCATION}"
            "resourceGroupName=${resource_group_name}"
            "imageTag=bootstrap"
            "deployApps=false"
            "searchServiceName=${SEARCH_SERVICE_NAME}"
            "searchIndexName=${search_index_name}"
            "storageAccountName=${STORAGE_ACCOUNT_NAME}"
            "storageContainerName=${storage_container_name}"
            "documentIntelligenceEndpoint=${DOCUMENT_INTELLIGENCE_ENDPOINT}"
            "openAIEndpoint=${OPENAI_ENDPOINT}"
            "openAIDeploymentName=${OPENAI_DEPLOYMENT_NAME}"
            "openAIApiVersion=${openai_api_version}"
            "databaseAdminUsername=${DATABASE_ADMIN_USERNAME}"
            "databaseAdminPassword=${DATABASE_ADMIN_PASSWORD}"
            "searchApiKey=${SEARCH_API_KEY}"
            "storageConnectionString=${STORAGE_CONNECTION_STRING}"
            "documentIntelligenceApiKey=${DOCUMENT_INTELLIGENCE_API_KEY}"
            "openAIApiKey=${OPENAI_API_KEY}"
          )

          az deployment sub create \
            --location "${AZURE_LOCATION}" \
            --name "bootstrap-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
            --template-file infra/main.bicep \
            --parameters "${params[@]}"

  build-images:
    name: Build and Push Images
    runs-on: ubuntu-latest
    needs: bootstrap-infra
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || (github.ref_name == 'main' && 'prod' || 'dev') }}
    outputs:
      acr_login_server: ${{ steps.acr.outputs.login_server }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve ACR and authenticate
        id: acr
        shell: bash
        run: |
          set -euo pipefail
          acr_name="acrsondralegal${DEPLOY_ENV}"
          login_server="$(az acr show --name "${acr_name}" --query loginServer -o tsv)"
          az acr login --name "${acr_name}"
          echo "login_server=${login_server}" >> "$GITHUB_OUTPUT"

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ steps.acr.outputs.login_server }}/sondra-legal-backend:${{ env.IMAGE_TAG }}
            ${{ steps.acr.outputs.login_server }}/sondra-legal-backend:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ steps.acr.outputs.login_server }}/sondra-legal-frontend:${{ env.IMAGE_TAG }}
            ${{ steps.acr.outputs.login_server }}/sondra-legal-frontend:latest

  deploy:
    name: Deploy with Current Image Tag
    runs-on: ubuntu-latest
    needs: build-images
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || (github.ref_name == 'main' && 'prod' || 'dev') }}
    env:
      RESOURCE_GROUP_NAME: ${{ vars.AZURE_RESOURCE_GROUP }}
      SEARCH_SERVICE_NAME: ${{ vars.SEARCH_SERVICE_NAME }}
      SEARCH_INDEX_NAME: ${{ vars.SEARCH_INDEX_NAME }}
      STORAGE_ACCOUNT_NAME: ${{ vars.STORAGE_ACCOUNT_NAME }}
      STORAGE_CONTAINER_NAME: ${{ vars.STORAGE_CONTAINER_NAME }}
      DOCUMENT_INTELLIGENCE_ENDPOINT: ${{ vars.DOCUMENT_INTELLIGENCE_ENDPOINT }}
      OPENAI_ENDPOINT: ${{ vars.OPENAI_ENDPOINT }}
      OPENAI_DEPLOYMENT_NAME: ${{ vars.OPENAI_DEPLOYMENT_NAME }}
      OPENAI_API_VERSION: ${{ vars.OPENAI_API_VERSION }}
      DATABASE_ADMIN_USERNAME: ${{ vars.DATABASE_ADMIN_USERNAME }}
      DATABASE_ADMIN_PASSWORD: ${{ secrets.DATABASE_ADMIN_PASSWORD }}
      SEARCH_API_KEY: ${{ secrets.SEARCH_API_KEY }}
      STORAGE_CONNECTION_STRING: ${{ secrets.STORAGE_CONNECTION_STRING }}
      DOCUMENT_INTELLIGENCE_API_KEY: ${{ secrets.DOCUMENT_INTELLIGENCE_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Bicep template
        id: deploy
        shell: bash
        run: |
          set -euo pipefail

          resource_group_name="${RESOURCE_GROUP_NAME:-rg-sondra-legal-${DEPLOY_ENV}}"
          search_index_name="${SEARCH_INDEX_NAME:-documents}"
          storage_container_name="${STORAGE_CONTAINER_NAME:-documents}"
          openai_api_version="${OPENAI_API_VERSION:-2024-10-21}"

          params=(
            "environment=${DEPLOY_ENV}"
            "location=${AZURE_LOCATION}"
            "resourceGroupName=${resource_group_name}"
            "imageTag=${IMAGE_TAG}"
            "searchServiceName=${SEARCH_SERVICE_NAME}"
            "searchIndexName=${search_index_name}"
            "storageAccountName=${STORAGE_ACCOUNT_NAME}"
            "storageContainerName=${storage_container_name}"
            "documentIntelligenceEndpoint=${DOCUMENT_INTELLIGENCE_ENDPOINT}"
            "openAIEndpoint=${OPENAI_ENDPOINT}"
            "openAIDeploymentName=${OPENAI_DEPLOYMENT_NAME}"
            "openAIApiVersion=${openai_api_version}"
            "databaseAdminUsername=${DATABASE_ADMIN_USERNAME}"
            "databaseAdminPassword=${DATABASE_ADMIN_PASSWORD}"
            "searchApiKey=${SEARCH_API_KEY}"
            "storageConnectionString=${STORAGE_CONNECTION_STRING}"
            "documentIntelligenceApiKey=${DOCUMENT_INTELLIGENCE_API_KEY}"
            "openAIApiKey=${OPENAI_API_KEY}"
          )

          result="$(az deployment sub create \
            --location "${AZURE_LOCATION}" \
            --name "deploy-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
            --template-file infra/main.bicep \
            --parameters "${params[@]}" \
            --output json)"

          frontend_url="$(echo "${result}" | jq -r '.properties.outputs.frontendUrl.value')"
          backend_url="$(echo "${result}" | jq -r '.properties.outputs.backendUrl.value')"

          echo "frontend_url=${frontend_url}" >> "$GITHUB_OUTPUT"
          echo "backend_url=${backend_url}" >> "$GITHUB_OUTPUT"

      - name: Deployment summary
        run: |
          {
            echo "## Azure Container Apps Deployment"
            echo "- Environment: ${DEPLOY_ENV}"
            echo "- Image tag: ${IMAGE_TAG}"
            echo "- Frontend URL: ${{ steps.deploy.outputs.frontend_url }}"
            echo "- Backend URL: ${{ steps.deploy.outputs.backend_url }}"
          } >> "$GITHUB_STEP_SUMMARY"