name: Infrastructure Deploy (Terraform)

on:
  push:
    branches: [main, develop]
    paths:
      - 'infra/**'
      - '.github/workflows/infra-deploy.yml'
  pull_request:
    branches: [main]
    paths:
      - 'infra/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, prod]

# OIDC requires id-token: write at the workflow level.
# contents: read is needed for actions/checkout.
# pull-requests: write enables the plan comment bot.
permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TF_VERSION: '1.9.5'
  WORKING_DIR: './infra'

jobs:
  terraform:
    name: Terraform ${{ github.event_name == 'pull_request' && 'Plan' || 'Apply' }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'dev' }}

    # ARM_ variables are consumed by the azurerm provider and backend.
    # use_oidc = true means no ARM_CLIENT_SECRET is needed.
    env:
      ARM_USE_OIDC:        true
      ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          # Wrap terraform output so the plan can be captured as a step output
          terraform_wrapper: true

      - name: Terraform Format Check
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform fmt -check -recursive

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform init -input=false

      - name: Terraform Validate
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform plan -no-color -input=false -out=tfplan
        # Don't fail the workflow on plan output — the outcome is used below
        continue-on-error: true

      # Post the plan as a PR comment so reviewers can see exact changes
      - name: Comment PR with Plan
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const planOutcome = '${{ steps.plan.outcome }}';
            const planOutput  = `${{ steps.plan.outputs.stdout }}`;
            const body = [
              '#### Terraform Plan — `' + planOutcome + '`',
              '',
              '<details><summary>Show Plan</summary>',
              '',
              '```terraform',
              planOutput.substring(0, 60000), // GitHub comment limit ~65k chars
              '```',
              '',
              '</details>',
              '',
              `*Triggered by @${{ github.actor }} on \`${{ github.event_name }}\`*`,
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              body,
            });

      # Fail the job if the plan itself errored
      - name: Check Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1

      # Apply only on pushes to main (not PRs, not develop)
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform apply -auto-approve -input=false tfplan

      # Surface the Terraform outputs so they can be manually set as
      # GitHub Variables/Secrets after the first successful apply.
      - name: Show Outputs
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          echo "──────────────────────────────────────────────"
          echo "  Copy these values into GitHub Variables:"
          echo "──────────────────────────────────────────────"
          terraform output -json | jq -r 'to_entries[] | select(.value.sensitive == false) | "  \(.key) = \(.value.value)"'
          echo ""
          echo "  Sensitive outputs (retrieve with terraform output -raw <name>):"
          terraform output -json | jq -r 'to_entries[] | select(.value.sensitive == true) | "  \(.key)"'
          echo "──────────────────────────────────────────────"
