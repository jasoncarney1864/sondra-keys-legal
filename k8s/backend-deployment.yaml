################################################################################
# Sondra Keys Legal — Kubernetes Deployment
#
# Runs the FastAPI backend container inside the AKS cluster.
#
# Before applying, create the secrets object:
#   kubectl create secret generic sondra-keys-backend-secrets \
#     --from-literal=AZURE_SEARCH_ADMIN_KEY=<value> \
#     --from-literal=AZURE_OPENAI_API_KEY=<value> \
#     --from-literal=AZURE_STORAGE_ACCOUNT_KEY=<value> \
#     --from-literal=AZURE_CONTENT_UNDERSTANDING_KEY=<value> \
#     --from-literal=API_SECRET_KEY=<value>
#
# The CD workflow substitutes ACR_LOGIN_SERVER and IMAGE_TAG at deploy time.
################################################################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sondra-keys-backend
  namespace: default
  labels:
    app: sondra-keys-backend
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sondra-keys-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: sondra-keys-backend
        tier: backend
    spec:
      # Use the kubelet managed identity — no imagePullSecrets needed
      # because AKS was granted AcrPull via RBAC in Terraform.
      containers:
        - name: backend
          image: ACR_LOGIN_SERVER/sondra-keys-backend:IMAGE_TAG
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP

          # Non-sensitive configuration
          env:
            - name: ENVIRONMENT
              value: "dev"
            - name: LOG_LEVEL
              value: "info"
            - name: AZURE_SEARCH_INDEX_NAME
              value: "sondra-keys-index"

          # Sensitive configuration sourced from the K8s Secret
          envFrom:
            - secretRef:
                name: sondra-keys-backend-secrets

          resources:
            # Standard_B2s has 2 vCPU / 4 GB RAM total.
            # Reserve enough headroom for the system node pool.
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "750m"
              memory: "768Mi"

          # Readiness probe — only send traffic when the app is ready
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3

          # Liveness probe — restart the container if it hangs
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3

          # Startup probe — give FastAPI time to boot before checks begin
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12  # 60s total budget

      # Graceful shutdown
      terminationGracePeriodSeconds: 30

      # Security context — run as non-root
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
