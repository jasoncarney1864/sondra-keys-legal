<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" role="img" aria-label="Oil painting style white lilies">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e9ece2"/>
      <stop offset="1" stop-color="#b8c0aa"/>
    </linearGradient>
    <filter id="paint2" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="11"/>
      <feDisplacementMap in="SourceGraphic" scale="7"/>
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
    <radialGradient id="lily" cx="45%" cy="45%" r="60%">
      <stop offset="0" stop-color="#fff6ef"/>
      <stop offset="0.6" stop-color="#f4e4d8"/>
      <stop offset="1" stop-color="#dfbcb0"/>
    </radialGradient>
  </defs>
  <g filter="url(#paint2)" opacity="0.92">
    <g transform="translate(350 360)">
      <ellipse rx="45" ry="150" fill="url(#lily)" transform="rotate(0) translate(0 -90)"/>
      <ellipse rx="45" ry="150" fill="url(#lily)" transform="rotate(60) translate(0 -90)"/>
      <ellipse rx="45" ry="150" fill="url(#lily)" transform="rotate(120) translate(0 -90)"/>
      <ellipse rx="45" ry="150" fill="url(#lily)" transform="rotate(180) translate(0 -90)"/>
      <ellipse rx="45" ry="150" fill="url(#lily)" transform="rotate(240) translate(0 -90)"/>
      <ellipse rx="45" ry="150" fill="url(#lily)" transform="rotate(300) translate(0 -90)"/>
      <circle r="18" fill="#d8b36a"/>
    </g>
    <g transform="translate(620 430) scale(0.85)">
      <ellipse rx="40" ry="135" fill="url(#lily)" transform="rotate(15) translate(0 -88)"/>
      <ellipse rx="40" ry="135" fill="url(#lily)" transform="rotate(75) translate(0 -88)"/>
      <ellipse rx="40" ry="135" fill="url(#lily)" transform="rotate(135) translate(0 -88)"/>
      <ellipse rx="40" ry="135" fill="url(#lily)" transform="rotate(195) translate(0 -88)"/>
      <ellipse rx="40" ry="135" fill="url(#lily)" transform="rotate(255) translate(0 -88)"/>
      <ellipse rx="40" ry="135" fill="url(#lily)" transform="rotate(315) translate(0 -88)"/>
      <circle r="14" fill="#d5ac63"/>
    </g>
  </g>
</svg>
